<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enter OTP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .otp-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      width: 400px;
      text-align: center;
      animation: fadeIn 0.8s ease-in-out;
    }
    .otp-container h2 {
      margin-bottom: 15px;
      color: #333;
    }
    .otp-container p {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 20px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      transition: border 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border: 1px solid #6a11cb;
    }
    button {
      background: #6a11cb;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      width: 100%;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
    }
    button:hover {
      background: linear-gradient(135deg, #2575fc, #6a11cb);
    }
    .message {
      margin-top: 15px;
      font-size: 14px;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="otp-container">
    <h2>🔐 Enter OTP</h2>
    <p>Please enter the One-Time Password (OTP) sent to your registered device.</p>
    <form id="otpForm">
      <input type="hidden" id="tokenid" name="tokenid" value="{{ tokenid }}">
      <input type="text" id="otp" name="otp" placeholder="Enter OTP received" required>
      <button type="submit">Verify OTP & Continue</button>
    </form>
    <div id="message" class="message"></div>
  </div>

  <!-- Load your integration logic -->
  <script src="hdfc-securities-integration.js"></script>
  <script>
    const otpForm = document.getElementById('otpForm');
    const messageBox = document.getElementById('message');

    otpForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      messageBox.style.display = 'none';

      const formData = new FormData(otpForm);

      try {
        const response = await fetch('/validate-otp', {
          method: 'POST',
          body: formData
        });
        const responseData = await response.json();

        if (response.ok && responseData.status === 'success') {
          messageBox.textContent = '✅ OTP validated! Fetching holdings...';
          messageBox.className = 'message success';
          messageBox.style.display = 'block';

          // 🔑 Immediately fetch mapped holdings and insert into Supabase
          await fetchAndImportHoldings();

        } else if (responseData.status === 'redirect_required') {
          // fallback if backend still needs redirect
          window.location.href = responseData.redirect_url;
        } else {
          throw new Error(responseData.error || 'OTP validation failed');
        }

      } catch (err) {
        messageBox.textContent = `❌ Request failed: ${err.message}`;
        messageBox.className = 'message error';
        messageBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
