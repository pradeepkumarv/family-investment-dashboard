<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - HDFC Securities</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .otp-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .otp-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #28a745, #20c997, #17a2b8, #007bff);
        }

        .header {
            margin-bottom: 40px;
        }

        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #28a745, #20c997);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.3);
        }

        .icon i {
            font-size: 36px;
            color: white;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6c757d;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .phone-info {
            background: #e8f5e8;
            border: 1px solid #c3e6cb;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 30px;
            color: #155724;
            font-size: 14px;
        }

        .otp-input-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .otp-digit {
            width: 50px;
            height: 50px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .otp-digit:focus {
            outline: none;
            border-color: #28a745;
            background: white;
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.1);
        }

        .otp-digit.filled {
            border-color: #28a745;
            background: white;
            color: #28a745;
        }

        .btn-verify {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            margin-bottom: 20px;
        }

        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.3);
        }

        .btn-verify:active {
            transform: translateY(0);
        }

        .btn-verify:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff40;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .resend-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .timer {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .timer.expired {
            color: #dc3545;
        }

        .btn-resend {
            background: none;
            border: none;
            color: #007bff;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-resend:hover {
            background: #f8f9fa;
        }

        .btn-resend:disabled {
            color: #6c757d;
            cursor: not-allowed;
            text-decoration: none;
        }

        .security-tips {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .security-tips h4 {
            color: #856404;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .security-tips h4 i {
            margin-right: 8px;
        }

        .security-tips ul {
            color: #856404;
            font-size: 12px;
            margin-left: 20px;
        }

        .security-tips li {
            margin-bottom: 5px;
        }

        .back-link {
            text-align: center;
        }

        .back-link a {
            color: #6c757d;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #007bff;
        }

        .back-link i {
            margin-right: 8px;
        }

        .success-message, .error-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .progress-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            gap: 10px;
        }

        .step {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .step.completed {
            background: #28a745;
        }

        .step.active {
            background: #007bff;
        }

        .step.pending {
            background: #dee2e6;
            color: #6c757d;
        }

        .step-connector {
            width: 40px;
            height: 2px;
            background: #dee2e6;
        }

        .step-connector.active {
            background: #28a745;
        }

        @media (max-width: 480px) {
            .otp-container {
                padding: 30px 20px;
            }
            
            .title {
                font-size: 24px;
            }

            .otp-digit {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }

            .otp-input-group {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="otp-container">
        <div class="progress-indicator">
            <div class="step completed">1</div>
            <div class="step-connector active"></div>
            <div class="step active">2</div>
            <div class="step-connector"></div>
            <div class="step pending">3</div>
        </div>

        <div class="header">
            <div class="icon">
                <i class="fas fa-mobile-alt"></i>
            </div>
            <h1 class="title">Verify OTP</h1>
            <p class="subtitle">Enter the 6-digit code sent to your registered mobile</p>
            <div class="phone-info">
                <i class="fas fa-info-circle"></i> OTP sent to +91 ****56789
            </div>
        </div>

        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>

        <form id="otpForm">
            <div class="otp-input-group">
                <input type="text" class="otp-digit" maxlength="1" id="digit1">
                <input type="text" class="otp-digit" maxlength="1" id="digit2">
                <input type="text" class="otp-digit" maxlength="1" id="digit3">
                <input type="text" class="otp-digit" maxlength="1" id="digit4">
                <input type="text" class="otp-digit" maxlength="1" id="digit5">
                <input type="text" class="otp-digit" maxlength="1" id="digit6">
            </div>

            <button type="submit" id="verifyBtn" class="btn-verify">
                <div class="loading-spinner" id="loadingSpinner"></div>
                <span id="verifyText">
                    <i class="fas fa-check-circle"></i> Verify & Continue
                </span>
            </button>
        </form>

        <div class="resend-section">
            <div class="timer" id="timer">Resend OTP in <span id="countdown">60</span>s</div>
            <button id="resendBtn" class="btn-resend" disabled>
                <i class="fas fa-redo"></i> Resend OTP
            </button>
        </div>

        <div class="security-tips">
            <h4><i class="fas fa-shield-alt"></i> Security Tips</h4>
            <ul>
                <li>Never share your OTP with anyone</li>
                <li>OTP is valid for 5 minutes only</li>
                <li>Close this page after verification</li>
            </ul>
        </div>

        <div class="back-link">
            <a href="/login.html">
                <i class="fas fa-arrow-left"></i>
                Back to Login
            </a>
        </div>
    </div>

    <script>
        // OTP input handling
        const otpDigits = document.querySelectorAll('.otp-digit');
        const otpForm = document.getElementById('otpForm');
        const verifyBtn = document.getElementById('verifyBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const verifyText = document.getElementById('verifyText');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const resendBtn = document.getElementById('resendBtn');
        const countdown = document.getElementById('countdown');
        const timer = document.getElementById('timer');

        // Auto-focus and navigation between OTP inputs
        otpDigits.forEach((digit, index) => {
            digit.addEventListener('input', function(e) {
                if (this.value.length === 1) {
                    this.classList.add('filled');
                    if (index < otpDigits.length - 1) {
                        otpDigits[index + 1].focus();
                    }
                } else {
                    this.classList.remove('filled');
                }
            });

            digit.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value === '' && index > 0) {
                    otpDigits[index - 1].focus();
                    otpDigits[index - 1].classList.remove('filled');
                }
            });

            digit.addEventListener('paste', function(e) {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text');
                const digits = pastedData.replace(/\D/g, '').split('').slice(0, 6);
                
                digits.forEach((digit, i) => {
                    if (i < otpDigits.length) {
                        otpDigits[i].value = digit;
                        otpDigits[i].classList.add('filled');
                    }
                });
                
                if (digits.length === 6) {
                    otpDigits[5].focus();
                }
            });
        });

        // Focus first input on load
        otpDigits[0].focus();

        // Countdown timer
        let timeLeft = 60;
        const countdownInterval = setInterval(() => {
            timeLeft--;
            countdown.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                timer.classList.add('expired');
                timer.textContent = 'OTP expired';
                resendBtn.disabled = false;
            }
        }, 1000);

        // Resend OTP
        resendBtn.addEventListener('click', async function() {
            try {
                const response = await fetch('/api/hdfc/resend-otp', {
                    method: 'POST'
                });
                
                if (response.ok) {
                    // Reset timer
                    timeLeft = 60;
                    timer.classList.remove('expired');
                    timer.innerHTML = 'Resend OTP in <span id="countdown">60</span>s';
                    resendBtn.disabled = true;
                    
                    // Restart countdown
                    const newCountdown = document.getElementById('countdown');
                    const newInterval = setInterval(() => {
                        timeLeft--;
                        newCountdown.textContent = timeLeft;
                        
                        if (timeLeft <= 0) {
                            clearInterval(newInterval);
                            timer.classList.add('expired');
                            timer.textContent = 'OTP expired';
                            resendBtn.disabled = false;
                        }
                    }, 1000);
                    
                    successMessage.textContent = 'New OTP sent successfully!';
                    successMessage.style.display = 'block';
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 3000);
                }
            } catch (error) {
                errorMessage.textContent = 'Failed to resend OTP. Please try again.';
                errorMessage.style.display = 'block';
            }
        });

        // Form submission
        otpForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Get OTP value
            const otp = Array.from(otpDigits).map(digit => digit.value).join('');
            
            if (otp.length !== 6) {
                errorMessage.textContent = 'Please enter all 6 digits';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Hide previous messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            
            // Show loading state
            verifyBtn.disabled = true;
            loadingSpinner.style.display = 'inline-block';
            verifyText.innerHTML = 'Verifying...';
            
            try {
                const response = await fetch('/api/hdfc/verify-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ otp })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    successMessage.textContent = 'OTP verified successfully! Importing your data...';
                    successMessage.style.display = 'block';
                    
                    // Update progress indicator
                    document.querySelectorAll('.step')[2].classList.remove('pending');
                    document.querySelectorAll('.step')[2].classList.add('completed');
                    document.querySelectorAll('.step-connector')[1].classList.add('active');
                    
                    setTimeout(() => {
                        window.location.href = result.redirect_url || '/?import=success';
                    }, 2000);
                } else {
                    throw new Error(result.error || 'Invalid OTP');
                }
            } catch (error) {
                errorMessage.textContent = error.message || 'Verification failed. Please try again.';
                errorMessage.style.display = 'block';
                
                // Clear OTP inputs
                otpDigits.forEach(digit => {
                    digit.value = '';
                    digit.classList.remove('filled');
                });
                otpDigits[0].focus();
            } finally {
                // Reset button state
                verifyBtn.disabled = false;
                loadingSpinner.style.display = 'none';
                verifyText.innerHTML = '<i class="fas fa-check-circle"></i> Verify & Continue';
            }
        });
    </script>
</body>
</html>
