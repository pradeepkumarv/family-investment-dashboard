<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta & Title -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OTP Verification • MyApp</title>

  <!-- Inherit CSS & JS -->
  <link href="css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/main.css" rel="stylesheet" />
  <script src="js/jquery.min.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="index.html">MyApp</a>
  </nav>

  <!-- Main Content -->
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="card-title mb-4 text-center">Enter OTP</h2>
            <form id="otpForm">
              <div class="mb-3">
                <label for="otp" class="form-label">OTP Code</label>
                <input type="text" id="otp" name="otp"
                       class="form-control" required autofocus />
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">Verify</button>
              </div>
            </form>
            <div id="otpError" class="alert alert-danger mt-3 d-none"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer py-4 bg-light">
    <div class="container text-center">
      <small>&copy; 2025 MyApp. All rights reserved.</small>
    </div>
  </footer>

  <!-- Page-specific JS -->
  <script>
    $(function(){
      // Extract token from query param
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token') || '';

      $('#otpForm').on('submit', function(e){
        e.preventDefault();
        $.ajax({
          url: 'api/verify-otp',
          method: 'POST',
          contentType: 'application/json',
          dataType: 'json',
          data: JSON.stringify({
            otp: $('#otp').val(),
            token: token
          }),
          success: function(resp){
            if(resp.success){
              window.location.href = 'dashboard.html';
            } else {
              $('#otpError').text(resp.message)
                            .removeClass('d-none');
            }
          },
          error: function(xhr){
            $('#otpError').text('Verification failed. Try again.')
                          .removeClass('d-none');
          }
        });
      });
    });
  </script>
</body>
</html>
