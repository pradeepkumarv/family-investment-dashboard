<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enter OTP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .otp-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      width: 420px;
      text-align: center;
      animation: fadeIn 0.8s ease-in-out;
    }
    .otp-container h2 {
      margin-bottom: 15px;
      color: #333;
    }
    .otp-container p {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 20px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      transition: border 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border: 1px solid #6a11cb;
    }
    button {
      background: #6a11cb;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      width: 100%;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
    }
    button:hover {
      background: linear-gradient(135deg, #2575fc, #6a11cb);
    }
    .message {
      margin-top: 15px;
      font-size: 14px;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

      <input type="text" id="otp" name="otp" placeholder="Enter OTP received" required>
      <button type="submit">Verify OTP & Continue</button>
    </form>
    <div id="message" class="message"></div>
  </div>

  <script>
    const otpForm = document.getElementById('otpForm');
    const messageBox = document.getElementById('message');
    const redirectURL = 'https://pradeepkumarv.github.io/family-investment-dashboard/?import=success';

    otpForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      messageBox.style.display = 'none';

      const formData = new FormData(otpForm);

      try {
        const response = await fetch('/validate-otp', {
          method: 'POST',
          body: formData
        });
        const responseData = await response.json();

        if (response.ok && responseData.status === 'success') {
          messageBox.textContent = '✅ OTP validated! Fetching holdings...';
          messageBox.className = 'message success';
          messageBox.style.display = 'block';

          // 🔑 Import holdings into Supabase

async function fetchAndImportHoldings() {
    try {
        const response = await fetch(`${HDFC_CONFIG.backend_base}/callback`, {
            method: 'GET',
            credentials: 'include'  // keep session cookies for Flask
        });

        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Failed to fetch holdings');

        console.log("Callback result:", result);  // 👈 Debug log

        // ✅ Get current logged-in Supabase user
        const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
        if (userError || !user) {
            throw new Error("No authenticated Supabase user found");
        }
        const currentUserId = user.id; // This is a UUID

        if (Array.isArray(result.data)) {
            let insertedCount = 0;

            for (const holding of result.data) {
                console.log("Inserting holding for user:", currentUserId, holding);

                const { error } = await supabaseClient
                  .from('investments')
                  .insert({
                      // 🔑 member_id comes from auth.uid()
                      member_id: currentUserId,
                      investment_type: holding.investment_type,
                      company_name: holding.company_name || null,
                      authorised_quantity: holding.authorised_quantity || 0,
                      average_price: holding.average_price || 0,
                      brokerplatform: 'HDFC Securities',
                      close_price: holding.close_price || 0,
                      collateral_quantity: holding.collateral_quantity || 0,
                      corporate_action_indicator: holding.corporate_action_indicator || null,
                      corporate_action_message: holding.corporate_action_message || null,
                      createdat: new Date().toISOString(),
                      day_change: holding.day_change || 0,
                      day_change_percentage: holding.day_change_percentage || 0,
                      discrepancy: holding.discrepancy || false,
                      hdfcdata: JSON.stringify(holding),
                      instrument_token: holding.instrument_token || null,
                      investment_value: holding.investment_value || 0,
                      isin: holding.isin || null,
                      ltcg_quantity: holding.ltcg_quantity || 0,
                      mtf_indicator: holding.mtf_indicator || null,
                      pnl: holding.pnl || 0,
                      quantity: holding.quantity || 0,
                      realised: holding.realised || 0,
                      sector_name: holding.sector_name || null,
                      security_id: holding.security_id || null,
                      sip_indicator: holding.sip_indicator || null,
                      t1_quantity: holding.t1_quantity || 0,
                      used_quantity: holding.used_quantity || 0
                  });

                if (error) {
                    console.error("Supabase insert error:", error);
                } else {
                    insertedCount++;
                }
            }

            showHDFCMessage(`✅ Imported ${insertedCount} holdings from callback`, 'success');
        } else {
            showHDFCMessage('⚠️ No holdings found in callback response', 'warning');
        }
    } catch (err) {
        console.error('Error importing holdings:', err);
        showHDFCMessage(`Import failed: ${err.message}`, 'error');
    }
}
  </script>

</html>
