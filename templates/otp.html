<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enter OTP | Family Investment Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .otp-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .otp-card h2 {
      margin-bottom: 1rem;
      font-weight: bold;
      color: #333;
    }
    .message {
      margin-top: 1rem;
      display: none;
      font-weight: 500;
    }
    .message.success { color: green; }
    .message.error { color: red; }
    .btn-success {
      background: #ff4b2b;
      border: none;
    }
    .btn-success:hover {
      background: #e63e21;
    }
  </style>
</head>
<body>
  <div class="otp-card">
    <h2>🔐 Enter OTP</h2>
    <p>Please enter the One-Time Password sent to your registered device.</p>
    <form id="otpForm">
      <input type="hidden" id="tokenid" name="tokenid" value="{{ tokenid }}">
      <input type="text" id="otp" name="otp" class="form-control mb-3" placeholder="Enter OTP" required>
      <button type="submit" class="btn btn-success w-100">Verify OTP & Continue</button>
    </form>
    <div id="message" class="message"></div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js"></script>
  <script src="https://pradeepkumarv.github.io/family-investment-dashboard/static/js/hdfc-securities-integration.js"></script>
</body>
</html>
