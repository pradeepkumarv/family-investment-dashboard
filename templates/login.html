<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta & Title -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login • MyApp</title>

  <!-- Inherit CSS from index.html -->
  <link href="css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/main.css" rel="stylesheet" />

  <!-- Inherit any needed JS libraries -->
  <script src="js/jquery.min.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <!-- Navbar (copied from index.html) -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="index.html">MyApp</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="features.html">Features</a></li>
        <li class="nav-item"><a class="nav-link" href="pricing.html">Pricing</a></li>
        <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="card-title mb-4 text-center">Sign In</h2>
            <form id="loginForm" method="POST" action="otp.html">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username"
                       class="form-control" required autofocus />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password"
                       class="form-control" required />
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">Continue</button>
              </div>
            </form>
            <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer (copied from index.html) -->
  <footer class="footer py-4 bg-light">
    <div class="container text-center">
      <small>&copy; 2025 MyApp. All rights reserved.</small>
    </div>
  </footer>

  <!-- Page-specific JS -->
  <script>
    $(function(){
      $('#loginForm').on('submit', function(e){
        e.preventDefault();
        $.ajax({
          url: 'api/login',            // your backend endpoint
          method: 'POST',
          contentType: 'application/json',
          dataType: 'json',            // ensure response is parsed as JSON
          data: JSON.stringify({
            username: $('#username').val(),
            password: $('#password').val()
          }),
          success: function(resp){
            if(resp.success){
              window.location.href = 'otp.html?token=' + encodeURIComponent(resp.token);
            } else {
              $('#loginError').text(resp.message)
                              .removeClass('d-none');
            }
          },
          error: function(xhr){
            $('#loginError').text('Server error. Please try again.')
                            .removeClass('d-none');
          }
        });
      });
    });
  </script>
</body>
</html>
