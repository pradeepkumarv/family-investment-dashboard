<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDFC Securities Login - Family Investment Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #007bff, #28a745, #ffc107, #dc3545);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 25px rgba(0, 123, 255, 0.3);
        }

        .logo i {
            font-size: 36px;
            color: white;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6c757d;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
            font-size: 18px;
        }

        .form-input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-input:focus {
            outline: none;
            border-color: #007bff;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .form-input:focus + i {
            color: #007bff;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 123, 255, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff40;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .security-note {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            border-radius: 10px;
            padding: 15px;
            margin-top: 25px;
            display: flex;
            align-items: center;
        }

        .security-note i {
            color: #1976d2;
            font-size: 20px;
            margin-right: 12px;
        }

        .security-note p {
            color: #1565c0;
            font-size: 13px;
            margin: 0;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: #6c757d;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #007bff;
        }

        .back-link i {
            margin-right: 8px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .title {
                font-size: 24px;
            }
        }

        .success-message, .error-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-chart-line"></i>
            </div>
            <h1 class="title">HDFC Securities</h1>
            <p class="subtitle">Connect your investment account</p>
        </div>

        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>

        <form id="hdfcLoginForm">
            <div class="form-group">
                <label for="username">Username / Client ID</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" class="form-input" required>
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" class="form-input" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="btn-login">
                <div class="loading-spinner" id="loadingSpinner"></div>
                <span id="loginText">
                    <i class="fas fa-sign-in-alt"></i> Connect Account
                </span>
            </button>
        </form>

        <div class="security-note">
            <i class="fas fa-shield-alt"></i>
            <p>Your credentials are encrypted and secure. We use the official HDFC Securities API for safe data access.</p>
        </div>

        <div class="back-link">
            <a href="/">
                <i class="fas fa-arrow-left"></i>
                Back to Dashboard
            </a>
        </div>
    </div>
<script>
    document.getElementById('hdfcLoginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const loginBtn = document.getElementById('loginBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const loginText = document.getElementById('loginText');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        
        // Hide previous messages
        successMessage.style.display = 'none';
        errorMessage.style.display = 'none';
        
        // Show loading state
        loginBtn.disabled = true;
        loadingSpinner.style.display = 'inline-block';
        loginText.innerHTML = 'Connecting...';
        
        const formData = new FormData(this);
        const username = formData.get('username');
        const password = formData.get('password');
        
        try {
            const response = await fetch('/hdfc/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });
            
            // Check if response is JSON
            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                const htmlText = await response.text();
                console.error('Server returned HTML instead of JSON:', htmlText.substring(0, 200));
                throw new Error('Server configuration error. Please check if HDFC API endpoint exists.');
            }
            
            const result = await response.json();
            
            if (response.ok && result.success) {
                successMessage.textContent = 'Login successful! Redirecting to OTP verification...';
                successMessage.style.display = 'block';
                
                // Store session info if needed
                if (result.token_id) {
                    sessionStorage.setItem('hdfc_token_id', result.token_id);
                }
                
                setTimeout(() => {
                    window.location.href = result.redirect_url || '/otp.html';
                }, 1500);
            } else {
                throw new Error(result.error || result.message || 'Login failed');
            }
        } catch (error) {
            console.error('Login error:', error);
            let errorMsg = 'Connection failed. Please try again.';
            
            if (error.message.includes('Failed to fetch')) {
                errorMsg = 'Cannot connect to server. Please check your internet connection.';
            } else if (error.message.includes('Server configuration error')) {
                errorMsg = 'Server setup issue. Please contact administrator.';
            } else if (error.message) {
                errorMsg = error.message;
            }
            
            errorMessage.textContent = errorMsg;
            errorMessage.style.display = 'block';
        } finally {
            // Reset button state
            loginBtn.disabled = false;
            loadingSpinner.style.display = 'none';
            loginText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Connect Account';
        }
    });
</script>

    
</body>
</html>
