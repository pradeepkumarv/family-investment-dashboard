<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FamWealth Dashboard - Fixed</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="landing-page" class="landing-page">
        <!-- Landing Page Content or Login Form Here -->
    </div>

    <div id="main-dashboard" class="main-dashboard" style="display:none;">
        <!-- Dashboard content here including family management, investments, liabilities, accounts -->

        <!-- Liability Modal -->
        <div id="liability-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="liability-modal-title">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="liability-modal-title">Add Liability</h3>
                    <button class="modal-close" onclick="closeModal('liability-modal')" aria-label="Close">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="liability-form" onsubmit="event.preventDefault(); saveLiability();">
                        <div class="form-group">
                            <label for="liability-member">Member</label>
                            <select id="liability-member" required class="form-control"></select>
                        </div>
                        <div class="form-group">
                            <label for="liability-type">Liability Type</label>
                            <select id="liability-type" required class="form-control">
                                <option value="homeLoan">Home Loan</option>
                                <option value="personalLoan">Personal Loan</option>
                                <option value="creditCard">Credit Card</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="liability-lender">Lender/Bank</label>
                            <input id="liability-lender" type="text" required class="form-control" />
                        </div>
                        <div class="form-group">
                            <label for="liability-amount">Outstanding Amount</label>
                            <input id="liability-amount" type="number" required class="form-control" />
                        </div>
                        <div class="form-group">
                            <label for="liability-emi">EMI Amount</label>
                            <input id="liability-emi" type="number" class="form-control" />
                        </div>
                        <div class="form-group">
                            <label for="liability-rate">Interest Rate (%)</label>
                            <input id="liability-rate" type="number" step="0.01" class="form-control" />
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn--primary">Save</button>
                            <button type="button" class="btn btn--secondary" onclick="closeModal('liability-modal')">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Other modals and dashboard sections -->

    </div>

    <script src="app.js"></script>
</body>
</html>
